services:
  postgres:
    image: postgres:16
    container_name: misfinanzas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mi_basedatos
    ports:
      - "5432:5432"
    volumes:
      - misfinanzas-pgdata:/var/lib/postgresql/data

volumes:
  misfinanzas-pgdata:
